<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📋 Task Manager</h1>
        
        <!-- Add Task Form -->
        <div class="add-task-form">
            <input type="text" id="taskTitle" placeholder="Task title..." required>
            <textarea id="taskDesc" placeholder="Description (optional)..." rows="2"></textarea>
            <div class="datetime-row">
                <input type="date" id="taskDate">
                <input type="time" id="taskTime">
            </div>
            <button id="addBtn">+ Add Task</button>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-section">
            <button id="filterAll" class="active">📌 All</button>
            <button id="filterActive">⏳ Active</button>
            <button id="filterCompleted">✅ Completed</button>
        </div>

        <!-- Task List -->
        <div id="taskList"></div>

        <!-- Task Counter -->
        <div class="counter">
            <span id="taskCount">0</span> tasks remaining
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
